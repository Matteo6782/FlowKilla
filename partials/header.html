<!-- Header -->
<div class="py-3 py-md-4">
    <div class="glass-panel">
        <div class="app-header">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
                <div class="brand-logo">
                    <div class="brand-icon">
                        <i class="bi bi-vinyl-fill"></i>
                    </div>
                    <div>
                        <div class="brand-title font-display">FlowKilla</div>
                        <div class="brand-subtitle">Beat Detection • Word Flow System</div>
                    </div>
                </div>

                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <div class="badge-custom">
                        <i class="bi bi-hash"></i>
                        <span id="seedDisplay">—</span>
                    </div>
                    <button class="btn-custom btn-secondary-custom btn-icon-only" id="btnNewSeed" title="Nuova seed">
                        <i class="bi bi-shuffle"></i>
                    </button>
                    <button class="btn-custom btn-secondary-custom btn-icon-only" id="btnCopyLink" title="Copia link">
                        <i class="bi bi-link-45deg"></i>
                    </button>
                    <button class="btn-custom btn-secondary-custom d-none d-md-inline-flex" id="btnFullscreen">
                        <i class="bi bi-arrows-fullscreen"></i>
                        <span>Fullscreen</span>
                    </button>
                    <button class="btn-custom btn-secondary-custom" data-bs-toggle="offcanvas" data-bs-target="#settingsPanel">
                        <i class="bi bi-sliders"></i>
                        <span class="d-none d-sm-inline">Impostazioni</span>
                    </button>
                </div>
            </div>

            <!-- Mobile header banner -->
            <div class="ad-slot ad-slot--header d-md-none" aria-label="Pubblicità (header)">
                <div class="ad-slot__label">BANNER</div>
                <div class="ad-slot__size">320×50</div>
            </div>
        </div>
