            <!-- Word Stage -->
            <div class="word-stage" id="wordStage">
                <div class="word-glow"></div>

                <div class="current-word-wrapper">
                    <div class="current-word" id="currentWord">PREMI START</div>
                </div>

                <div class="queue-section">
                    <div class="queue-label text-center">
                        <i class="bi bi-list-ul me-2"></i>
                        Prossime Parole (Ordine Obbligatorio)
                    </div>
                    <div class="queue-pills" id="queueDisplay"></div>
                </div>

                <!-- Keyboard Hints -->
                <div class="text-center mt-4" style="color: var(--text-quaternary); font-size: 0.875rem;">
                    <span class="kbd-custom">Spazio</span> skip •
                    <span class="kbd-custom">Invio</span> start/stop •
                    <span class="kbd-custom">F</span> freeze •
                    <span class="kbd-custom">T</span> tap tempo
                </div>
            </div>

            <!-- Beat HUD -->
            <div class="beat-hud">
                <div class="beat-grid">
                    <div class="beat-info">
                        <div class="beat-stat">
                            <span class="beat-stat-label">
                                <i class="bi bi-speedometer2"></i>
                                Tempo
                            </span>
                            <span class="beat-stat-value"><span id="bpmDisplay">92</span> BPM</span>
                        </div>
                        <div class="progress-bar-wrapper">
                            <div class="progress-bar-fill" id="progressBar"></div>
                        </div>
                    </div>

                    <div class="beat-visualizer">
                        <div class="beat-dot" id="dot1"></div>
                        <div class="beat-dot" id="dot2"></div>
                        <div class="beat-dot" id="dot3"></div>
                        <div class="beat-dot" id="dot4"></div>
                    </div>

                    <div class="beat-info">
                        <div class="beat-stat">
                            <span class="beat-stat-label">
                                <i class="bi bi-music-note-list"></i>
                                Battuta
                            </span>
                            <span class="beat-stat-value"><span id="barDisplay">1</span>/4</span>
                        </div>
                        <div class="beat-stat">
                            <span class="beat-stat-label">Cambio ogni</span>
                            <span class="beat-stat-value"><span id="everyDisplay">4</span> beat</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Control Buttons -->
            <div class="p-3 border-top" style="border-color: var(--line-subtle) !important;">
                <div class="d-flex flex-wrap gap-2 justify-content-center">
                    <button class="btn-custom btn-primary-custom" id="btnStart">
                        <i class="bi bi-play-fill fs-5"></i>
                        <span>Start Session</span>
                    </button>
                    <button class="btn-custom btn-danger-custom" id="btnStop" disabled>
                        <i class="bi bi-stop-fill"></i>
                        <span>Stop</span>
                    </button>
                    <button class="btn-custom btn-secondary-custom" id="btnSkip">
                        <i class="bi bi-skip-forward-fill"></i>
                        <span>Skip</span>
                    </button>
                    <button class="btn-custom btn-secondary-custom" id="btnFreeze">
                        <i class="bi bi-snow"></i>
                        <span>Freeze</span>
                    </button>
                    <button class="btn-custom btn-secondary-custom d-none d-md-inline-flex" id="btnTapTempo">
                        <i class="bi bi-hand-index-thumb"></i>
                        <span>Tap Tempo</span>
                    </button>
                </div>
            </div>
        </div> <!-- close glass-panel from header partial -->
