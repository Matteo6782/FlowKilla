        <!-- Media Source Panel -->
        <div class="media-panel hidden" id="mediaPanel">
            <div class="media-header">
                <div class="media-title">
                    <i class="bi bi-play-circle"></i>
                    Beat Source
                </div>
                <div class="d-flex align-items-center gap-2">
                    <div class="media-badge" id="sourceTypeBadge">SYNTH</div>
                    <div class="auto-bpm-badge hidden" id="autoBpmBadge">
                        <i class="bi bi-check-circle-fill"></i>
                        <span>BPM Auto: <span id="detectedBpm">—</span></span>

                </div>

                    <span id="fileDuration">—</span>
                </div>
            </div>
        </div>
