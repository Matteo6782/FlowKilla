<!-- Mobile Dock -->
<div class="mobile-dock d-md-none">
    <div class="mobile-controls">
        <button class="btn-custom btn-primary-custom" id="dockStart">
            <i class="bi bi-play-fill fs-5"></i>
            <span>Start</span>
        </button>
        <button class="btn-custom btn-danger-custom" id="dockStop" disabled>
            <i class="bi bi-stop-fill fs-5"></i>
            <span>Stop</span>
        </button>
        <button class="btn-custom btn-secondary-custom btn-icon-only" id="dockSkip">
            <i class="bi bi-skip-forward-fill fs-5"></i>
        </button>
    </div>
</div>
